<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票分析看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1200px;margin:0 auto;padding:16px 20px}
h1{font-size:22px;font-weight:700}.sub{color:#8b949e;font-size:12px;margin:4px 0 16px}
.idx-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.idx-card{flex:1;min-width:100px;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 10px;text-align:center}
.idx-card .n{font-size:10px;color:#8b949e}.idx-card .p{font-size:14px;font-weight:700;margin:2px 0}.idx-card .c{font-size:10px}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1;padding:8px 12px;border:1px solid #21262d;border-radius:8px;background:#0d1117;color:#c9d1d9;font-size:13px;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.search-bar button{padding:8px 16px;border:1px solid #238636;border-radius:8px;background:#238636;color:#fff;font-size:13px;cursor:pointer}
.results,.snapshot{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 10px;cursor:pointer;transition:border .15s}.card:hover{border-color:#58a6ff}
.card .nm{font-size:11px;font-weight:600}.card .pr{font-size:15px;font-weight:700;margin-top:3px}.card .ch{font-size:10px;margin-top:1px}
.red{color:#f85149}.green{color:#3fb950}
.section-title{font-size:12px;color:#8b949e;margin-bottom:6px;display:flex;justify-content:space-between}
.hidden{display:none!important}
.back-btn{color:#58a6ff;cursor:pointer;font-size:13px;background:none;border:none;margin-bottom:12px}
.detail-info{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px;margin-bottom:12px}
.detail-info h2{font-size:18px}.detail-info .meta{font-size:11px;color:#8b949e;margin:2px 0}
.detail-info .big-price{font-size:26px;font-weight:700;margin-top:6px}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin:12px 0}
.metric{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px}
.metric .lbl{font-size:9px;color:#8b949e}.metric .val{font-size:15px;font-weight:700;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
td,th{padding:4px 6px;text-align:right;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:400;font-size:10px}td:first-child,th:first-child{text-align:left}
</style>
</head>
<body>
<div class="container">
  <div id="home">
    <h1>📈 股票分析看板</h1>
    <p class="sub">A股·美股·港股 | 新浪财经实时数据 | 阿里云 ECS 国内部署</p>
    <div class="idx-bar" id="idxBar"></div>
    <div class="search-bar"><input id="q" placeholder="搜索 — 茅台 / AAPL / 腾讯 / 比亚迪 ..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">搜索</button></div>
    <div id="results" class="results"></div>
    <div class="section-title"><span>市场快照</span><span id="st" style="font-size:10px;color:#484f58"></span></div>
    <div class="snapshot" id="snap"></div>
  </div>
  <div id="detail" class="hidden"></div>
</div>
<script>
var M={cn:{f:'🇨🇳',c:'¥'},us:{f:'🇺🇸',c:'$'},hk:{f:'🇭🇰',c:'HK$'}};
var DEF=['600519','300750','002594','AAPL','NVDA','0700','1810','3690'];
var IDX={上证指数:'000001',深证成指:'399001',创业板指:'399006',恒生指数:'HSI',纳斯达克:'^IXIC',标普500:'^GSPC'};
function F(n,d){d=d||2;return Number(n).toFixed(d)}function C(c){return c>0?'red':c<0?'green':''}
async function A(p){var r=await fetch('/api'+p);if(!r.ok)throw Error(r.status);return r.json()}

async function init(){
  // Build index bar HTML first
  var bar='';for(var k in IDX)bar+='<div class="idx-card" id="i_'+IDX[k]+'"><div class="n">'+k+'</div><div class="p">—</div><div class="c">—</div></div>';
  document.getElementById('idxBar').innerHTML=bar;
  // Batch load all data
  var codes=[];for(var k in IDX)codes.push(IDX[k]);codes=codes.concat(DEF);
  // Try real data first, fall back to demo
  try{
    var data=await A('/v1/stocks/batch?codes='+encodeURIComponent(codes.join(','))+'&fast=false');
  }catch(e){
    data=await A('/v1/stocks/batch?codes='+encodeURIComponent(codes.join(','))+'&fast=true');
  }
  renderAll(data);
}

function renderAll(data){
  for(var k in IDX){var d=data[IDX[k]];if(!d)continue;var c=d.change_pct||0;var el=document.getElementById('i_'+IDX[k]);if(el)el.innerHTML='<div class="n">'+k+'</div><div class="p">'+F(d.price,2)+'</div><div class="c '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div>'}
  var html='',n=0;for(var i=0;i<DEF.length;i++){var q=data[DEF[i]],code=DEF[i];if(q){var m=code.match(/^\d{6}$/)?'cn':/^\d{4,5}$/.test(code)?'hk':'us',c=q.change_pct||0;html+='<div class="card" onclick="V(\''+code+'\')"><div class="nm">'+M[m].f+' '+q.name+'</div><div class="pr">'+M[m].c+F(q.price)+'</div><div class="ch '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div></div>';n++}}
  document.getElementById('snap').innerHTML=html;document.getElementById('st').textContent='('+n+'/'+DEF.length+')';
}

async function doSearch(){
  var q=document.getElementById('q').value.trim();if(!q)return;
  var data=await A('/v1/stocks/search?q='+encodeURIComponent(q));
  var html='';for(var i=0;i<data.length;i++){var s=data[i],m=s.market,c=s.change_pct||0;html+='<div class="card" onclick="V(\''+s.code+'\')"><div class="nm">'+(M[m]?M[m].f:'')+' '+s.name+'</div><div class="pr">'+(M[m]?M[m].c:'')+F(s.price)+'</div><div class="ch '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div></div>'}
  document.getElementById('results').innerHTML=html||'<p style="color:#8b949e;padding:20px">未找到匹配股票</p>';
}

async function V(code){
  document.getElementById('home').classList.add('hidden');document.getElementById('detail').classList.remove('hidden');
  document.getElementById('detail').innerHTML='<p style="color:#8b949e;text-align:center;padding:60px">加载中...</p>';
  try{
    var info=await A('/v1/stocks/'+code+'/info'),quote=await A('/v1/stocks/'+code+'/quote'),ind=await A('/v1/indicators/'+code+'?days=365');
    var m=info.market,mm=M[m]||M.us,c=quote.change_pct||0,kl=ind.klines,n=kl.length,last=kl[n-1];
    var rsi=ind.rsi14?ind.rsi14[n-1]:null,kv=ind.kdj_k?ind.kdj_k[n-1]:null,dv=ind.kdj_d?ind.kdj_d[n-1]:null;
    var html='<button class="back-btn" onclick="B()">← 返回大盘</button>';
    html+='<div class="detail-info"><h2>'+mm.f+' '+info.name+'</h2><div class="meta">'+code+'</div>';
    html+='<div class="big-price">'+mm.c+F(quote.price)+' <span class="'+C(c)+'" style="font-size:16px">'+(c>0?'+':'')+F(c,2)+'%</span></div>';
    html+='<div class="metrics">';
    var metrics=[['开盘',F(quote.open)],['昨收',F(quote.pre_close)],['最高',F(quote.high)],['最低',F(quote.low)],['成交量',(quote.volume/10000).toFixed(0)+'万'],['RSI(14)',rsi!=null?F(rsi,1):'—',rsi>70?'超买':rsi<30?'超卖':''],['KDJ-K',kv!=null?F(kv,1):'—'],['KDJ-D',dv!=null?F(dv,1):'—']];
    for(var i=0;i<metrics.length;i++){var mt=metrics[i];html+='<div class="metric"><div class="lbl">'+mt[0]+'</div><div class="val">'+mt[1]+'</div>'+(mt[2]?'<div class="lbl '+(mt[2]==='超买'?'red':'green')+'">'+mt[2]+'</div>':'')+'</div>'}
    html+='</div></div>';
    // Real K-line table from Tencent
    html+='<div style="max-height:350px;overflow:auto"><table><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>成交量</th><th>涨跌</th></tr></thead><tbody>';
    for(var i=n-1;i>=Math.max(0,n-30);i--){var k=kl[i],prev=i>0?kl[i-1]:null,ch=prev?((k.close-prev.close)/prev.close*100):0;html+='<tr><td>'+k.date+'</td><td>'+F(k.open)+'</td><td>'+F(k.high)+'</td><td>'+F(k.low)+'</td><td>'+F(k.close)+'</td><td>'+(k.volume/10000).toFixed(0)+'万</td><td class="'+C(ch)+'">'+(ch?((ch>0?'+':'')+F(ch,2)+'%'):'—')+'</td></tr>'}
    html+='</tbody></table></div>';
    document.getElementById('detail').innerHTML=html;
  }catch(e){document.getElementById('detail').innerHTML='<button class="back-btn" onclick="B()">← 返回</button><p style="color:#8b949e;text-align:center;padding:60px">加载失败</p>'}
}

function B(){document.getElementById('home').classList.remove('hidden');document.getElementById('detail').classList.add('hidden')}
init();
</script>
</body>
</html>
