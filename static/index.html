<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票分析看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1200px;margin:0 auto;padding:16px 20px}
h1{font-size:22px;font-weight:700}.sub{color:#8b949e;font-size:12px;margin:4px 0 16px}
.idx-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.idx-card{flex:1;min-width:100px;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 10px;text-align:center}
.idx-card .n{font-size:10px;color:#8b949e}.idx-card .p{font-size:14px;font-weight:700;margin:2px 0}.idx-card .c{font-size:10px}
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1;padding:8px 12px;border:1px solid #21262d;border-radius:8px;background:#0d1117;color:#c9d1d9;font-size:13px;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.search-bar button{padding:8px 16px;border:1px solid #238636;border-radius:8px;background:#238636;color:#fff;font-size:13px;cursor:pointer}
.results,.snapshot{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 10px;cursor:pointer;transition:border .15s}.card:hover{border-color:#58a6ff}
.card .nm{font-size:11px;font-weight:600}.card .pr{font-size:15px;font-weight:700;margin-top:3px}.card .ch{font-size:10px;margin-top:1px}
.red{color:#f85149}.green{color:#3fb950}
.section-title{font-size:12px;color:#8b949e;margin-bottom:6px;display:flex;justify-content:space-between}
.period-btn{padding:5px 14px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#8b949e;cursor:pointer;font-size:11px;transition:all .15s;margin-right:4px}.period-btn:hover{border-color:#58a6ff;color:#c9d1d9}.period-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff;box-shadow:0 0 8px rgba(31,111,235,.3)}
.stock-hdr{margin-bottom:14px}.stock-hdr h2{font-size:18px}.stock-hdr .meta{font-size:11px;color:#8b949e;margin:2px 0}.stock-hdr .big-price{font-size:26px;font-weight:700;margin-top:4px}
.hidden{display:none!important}
.back-btn{color:#58a6ff;cursor:pointer;font-size:13px;background:none;border:none;margin-bottom:12px}
.detail-info{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px;margin-bottom:12px}
.detail-info h2{font-size:18px}.detail-info .meta{font-size:11px;color:#8b949e;margin:2px 0}
.detail-info .big-price{font-size:26px;font-weight:700;margin-top:6px}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin:12px 0}
.metric{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px}
.metric .lbl{font-size:9px;color:#8b949e}.metric .val{font-size:15px;font-weight:700;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
td,th{padding:4px 6px;text-align:right;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:400;font-size:10px}td:first-child,th:first-child{text-align:left}
</style>
</head>
<body>
<div class="container">
  <div id="home">
    <h1>📈 股票分析看板</h1>
    <p class="sub">A股·美股·港股 | 腾讯财经实时数据 | 阿里云 ECS 国内部署</p>
    <div class="idx-bar" id="idxBar"></div>
    <div class="search-bar"><input id="q" placeholder="搜索 — 茅台 / AAPL / 腾讯 / 比亚迪 ..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">搜索</button></div>
    <div id="results" class="results"></div>
    <div class="section-title"><span>市场快照</span><span id="st" style="font-size:10px;color:#484f58"></span></div>
    <div class="snapshot" id="snap"></div>
    <div class="section-title" style="margin-top:20px">📰 市场情绪</div>
    <div id="newsPanel" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:6px;margin-bottom:16px"></div>
  </div>
  <div id="detail" class="hidden"></div>
</div>
<script>
var M={cn:{f:'🇨🇳',c:'¥'},us:{f:'🇺🇸',c:'$'},hk:{f:'🇭🇰',c:'HK$'}};
var DEF=['600519','300750','002594','AAPL','NVDA','0700','1810','3690'];
var IDX={上证指数:'sh000001',深证成指:'sz399001',创业板指:'sz399006',恒生指数:'hkHSI',纳斯达克:'usIXIC',标普500:'usINX'};
function F(n,d){d=d||2;return Number(n).toFixed(d)}function C(c){return c>0?'red':c<0?'green':''}
async function A(p){var r=await fetch('/api'+p);if(!r.ok)throw Error(r.status);return r.json()}

async function init(){
  // Build index bar HTML first
  var bar='';for(var k in IDX)bar+='<div class="idx-card" id="i_'+IDX[k]+'"><div class="n">'+k+'</div><div class="p">—</div><div class="c">—</div></div>';
  document.getElementById('idxBar').innerHTML=bar;
  // Batch load all data
  var codes=[];for(var k in IDX)codes.push(IDX[k]);codes=codes.concat(DEF);
  // Try real data first, fall back to demo
  try{
    var data=await A('/v1/stocks/batch?codes='+encodeURIComponent(codes.join(','))+'&fast=false');
  }catch(e){
    data=await A('/v1/stocks/batch?codes='+encodeURIComponent(codes.join(','))+'&fast=true');
  }
  renderAll(data);
}

function renderAll(data){
  for(var k in IDX){var d=data[IDX[k]];if(!d)continue;var c=d.change_pct||0;var el=document.getElementById('i_'+IDX[k]);if(el)el.innerHTML='<div class="n">'+k+'</div><div class="p">'+F(d.price,2)+'</div><div class="c '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div>'}
  var html='',n=0;for(var i=0;i<DEF.length;i++){var q=data[DEF[i]],code=DEF[i];if(q){var m=code.match(/^\d{6}$/)?'cn':/^\d{4,5}$/.test(code)?'hk':'us',c=q.change_pct||0;html+='<div class="card" onclick="V(\''+code+'\')"><div class="nm">'+M[m].f+' '+q.name+'</div><div class="pr">'+M[m].c+F(q.price)+'</div><div class="ch '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div></div>';n++}}
  document.getElementById('snap').innerHTML=html;document.getElementById('st').textContent='('+n+'/'+DEF.length+')';
}

async function doSearch(){
  var q=document.getElementById('q').value.trim();if(!q)return;
  var data=await A('/v1/stocks/search?q='+encodeURIComponent(q));
  var html='';for(var i=0;i<data.length;i++){var s=data[i],m=s.market,c=s.change_pct||0;html+='<div class="card" onclick="V(\''+s.code+'\')"><div class="nm">'+(M[m]?M[m].f:'')+' '+s.name+'</div><div class="pr">'+(M[m]?M[m].c:'')+F(s.price)+'</div><div class="ch '+C(c)+'">'+(c>0?'+':'')+F(c,2)+'%</div></div>'}
  document.getElementById('results').innerHTML=html||'<p style="color:#8b949e;padding:20px">未找到匹配股票</p>';
}

async function V(code){
  document.getElementById('home').classList.add('hidden');document.getElementById('detail').classList.remove('hidden');
  document.getElementById('detail').innerHTML='<p style="color:#8b949e;text-align:center;padding:60px">加载中...</p>';
  try{
    var info=await A('/v1/stocks/'+code+'/info'),quote=await A('/v1/stocks/'+code+'/quote'),ind=await A('/v1/indicators/'+code+'?days=365');
    var m=info.market,mm=M[m]||M.us,c=quote.change_pct||0,kl=ind.klines,n=kl.length,last=kl[n-1];
    var rsi=ind.rsi14?ind.rsi14[n-1]:null,kv=ind.kdj_k?ind.kdj_k[n-1]:null,dv=ind.kdj_d?ind.kdj_d[n-1]:null;
    var html='<button class="back-btn" onclick="B()">← 返回大盘</button>';
    html+='<div class="detail-info"><h2>'+mm.f+' '+info.name+'</h2><div class="meta">'+code+'</div>';
    html+='<div class="big-price">'+mm.c+F(quote.price)+' <span class="'+C(c)+'" style="font-size:16px">'+(c>0?'+':'')+F(c,2)+'%</span></div>';
    html+='<div class="metrics">';
    var metrics=[['开盘',F(quote.open)],['昨收',F(quote.pre_close)],['最高',F(quote.high)],['最低',F(quote.low)],['成交量',(quote.volume/10000).toFixed(0)+'万'],['RSI(14)',rsi!=null?F(rsi,1):'—',rsi>70?'超买':rsi<30?'超卖':''],['KDJ-K',kv!=null?F(kv,1):'—'],['KDJ-D',dv!=null?F(dv,1):'—']];
    for(var i=0;i<metrics.length;i++){var mt=metrics[i];html+='<div class="metric"><div class="lbl">'+mt[0]+'</div><div class="val">'+mt[1]+'</div>'+(mt[2]?'<div class="lbl '+(mt[2]==='超买'?'red':'green')+'">'+mt[2]+'</div>':'')+'</div>'}
    html+='</div></div>';
    html+='<div style="margin:8px 0"><span style="font-size:11px;color:#8b949e;margin-right:8px">时间范围:</span>';
    html+='<button class="period-btn active" onclick="chPeriod(\''+code+'\',30,this)">1月</button>';
    html+='<button class="period-btn" onclick="chPeriod(\''+code+'\',90,this)">3月</button>';
    html+='<button class="period-btn" onclick="chPeriod(\''+code+'\',180,this)">半年</button>';
    html+='<button class="period-btn" onclick="chPeriod(\''+code+'\',365,this)">1年</button>';
    html+='</div>';
    html+='<div class="chart-box"><div class="chart-title" style="font-size:12px;color:#8b949e;padding:8px 14px 0">K线图</div><canvas id="klineCanvas" style="width:100%;height:380px"></canvas></div>';
    html+='<div class="chart-box"><div class="chart-title" style="font-size:12px;color:#8b949e;padding:8px 14px 0">成交量</div><canvas id="volCanvas" style="width:100%;height:100px"></canvas></div>';
    // Real K-line table from Tencent
    html+='<div style="max-height:350px;overflow:auto"><table><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>成交量</th><th>涨跌</th></tr></thead><tbody>';
    for(var i=n-1;i>=Math.max(0,n-30);i--){var k=kl[i],prev=i>0?kl[i-1]:null,ch=prev?((k.close-prev.close)/prev.close*100):0;html+='<tr><td>'+k.date+'</td><td>'+F(k.open)+'</td><td>'+F(k.high)+'</td><td>'+F(k.low)+'</td><td>'+F(k.close)+'</td><td>'+(k.volume/10000).toFixed(0)+'万</td><td class="'+C(ch)+'">'+(ch?((ch>0?'+':'')+F(ch,2)+'%'):'—')+'</td></tr>'}
    html+='</tbody></table></div>';
    document.getElementById('detail').innerHTML=html;
    setTimeout(function(){drawCanvas(kl)},100);
  }catch(e){document.getElementById('detail').innerHTML='<button class="back-btn" onclick="B()">← 返回</button><p style="color:#8b949e;text-align:center;padding:60px">加载失败</p>'}
}

async function loadNews(){
  try{
    var news=await A('/v1/news/?limit=12');
    var html='';
    for(var i=0;i<news.length;i++){
      var n=news[i],s=n.sentiment_score,emoji=s>0.05?'📈':s<-0.05?'📉':'➖',cl=s>0.05?'green':s<-0.05?'red':'';
      html+='<div class="card" style="cursor:default;padding:10px 12px"><div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:14px">'+emoji+'</span><div><div style="font-size:12px;line-height:1.4">'+n.title+'</div><div style="font-size:10px;color:#484f58;margin-top:4px">'+n.source+' · '+n.published_at+' · <span class="'+cl+'">'+(s>0?'+':'')+s.toFixed(2)+'</span></div></div></div></div>';
    }
    document.getElementById('newsPanel').innerHTML=html;
  }catch(e){}
}

function B(){document.getElementById('home').classList.remove('hidden');document.getElementById('detail').classList.add('hidden')}

function drawCanvas(kl){
  var W=document.getElementById('klineCanvas').parentElement.clientWidth-30;
  var kc=document.getElementById('klineCanvas'),ctx=kc.getContext('2d');
  var dpr=window.devicePixelRatio||1;kc.width=W*dpr;kc.height=380*dpr;kc.style.width=W+'px';kc.style.height='380px';ctx.scale(dpr,dpr);
  var n=kl.length,pad={t:15,b:40,l:60,r:15},bw=W-pad.l-pad.r,bh=380-pad.t-pad.b;
  var hi=-Infinity,lo=Infinity;for(var i=0;i<n;i++){if(kl[i].high>hi)hi=kl[i].high;if(kl[i].low<lo)lo=kl[i].low}
  var yr=bh/(hi-lo),xr=bw/(n-1),cw=Math.max(1,xr*0.65);

  function render(crossIdx){
    ctx.clearRect(0,0,W,380);
    // Grid
    ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
    for(var i=0;i<5;i++){var y=pad.t+bh*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke()}
    // Candles
    for(var i=0;i<n;i++){var k=kl[i],x=pad.l+i*xr,isRed=k.close>=k.open;
      ctx.fillStyle=isRed?'#f85149':'#3fb950';ctx.strokeStyle=isRed?'#f85149':'#3fb950';ctx.lineWidth=1;
      ctx.fillRect(x-cw/2,pad.t+(hi-Math.max(k.open,k.close))*yr,cw,Math.abs(k.close-k.open)*yr||1);
      ctx.beginPath();ctx.moveTo(x,pad.t+(hi-k.high)*yr);ctx.lineTo(x,pad.t+(hi-k.low)*yr);ctx.stroke()}
    // MAs
    [['ma5','#d29922',5],['ma20','#bc8cff',20]].forEach(function(ma){
      ctx.strokeStyle=ma[1];ctx.lineWidth=1;ctx.beginPath();var started=false;
      for(var i=ma[2]-1;i<n;i++){var s=0;for(var j=i-ma[2]+1;j<=i;j++)s+=kl[j].close;var v=s/ma[2];var x=pad.l+i*xr,y=pad.t+(hi-v)*yr;started?ctx.lineTo(x,y):ctx.moveTo(x,y);started=true}ctx.stroke()});
    // Crosshair
    if(typeof crossIdx!=='undefined'&&crossIdx>=0&&crossIdx<n){
      var cx=pad.l+crossIdx*xr;ctx.strokeStyle='#889';ctx.lineWidth=0.5;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(cx,pad.t);ctx.lineTo(cx,pad.t+bh);ctx.stroke();ctx.setLineDash([]);
      // Tooltip
      var k=kl[crossIdx],ch=((k.close-k.open)/k.open*100).toFixed(2),chc=k.close>=k.open?'#f85149':'#3fb950';
      var txt=['日期:'+k.date,'开:'+k.open.toFixed(2),'高:'+k.high.toFixed(2),'低:'+k.low.toFixed(2),'收:'+k.close.toFixed(2),'量:'+(k.volume/10000).toFixed(0)+'万',(ch>0?'+':'')+ch+'%'];
      ctx.font='10px monospace';var tw=0,th=txt.length*15+10;
      for(var i=0;i<txt.length;i++){var m=ctx.measureText(txt[i]);if(m.width>tw)tw=m.width}
      var tx=cx+10,ty=pad.t+10;if(tx+tw+10>W)tx=cx-tw-20;
      ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(tx,ty,tw+16,th);
      ctx.fillStyle='#c9d1d9';for(var i=0;i<txt.length;i++)ctx.fillText(txt[i],tx+8,ty+14+i*15);
      if(txt.length===7)ctx.fillStyle=chc,ctx.fillText(txt[6],tx+8,ty+14+6*15);
    }
    // Labels
    ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';
    for(var i=0;i<5;i++){var v=hi-(hi-lo)*i/4;ctx.fillText(v.toFixed(v>10?0:2),2,pad.t+bh*i/4+4)}
    for(var i=0;i<n;i+=Math.max(1,Math.floor(n/6)))ctx.fillText(kl[i].date.slice(5),pad.l+i*xr-22,W-8);
  }

  render();

  // Mouse interaction
  kc.onmousemove=function(e){
    var rect=kc.getBoundingClientRect(),mx=e.clientX-rect.left;
    var idx=Math.round((mx-pad.l)/xr);
    if(idx>=0&&idx<n&&mx>=pad.l&&mx<=W-pad.r){render(idx)}else{render()}
  };
  kc.onmouseleave=function(){render()};

  // Volume
  var vc=document.getElementById('volCanvas'),vctx=vc.getContext('2d');
  vc.width=W*dpr;vc.height=100*dpr;vc.style.width=W+'px';vc.style.height='100px';vctx.scale(dpr,dpr);
  var mx=0;for(var i=0;i<n;i++)if(kl[i].volume>mx)mx=kl[i].volume;
  var vr=90/mx;vctx.fillStyle='#0d1117';vctx.fillRect(pad.l,0,W-pad.l-pad.r,100);
  for(var i=0;i<n;i++){var x=pad.l+i*xr,h=kl[i].volume*vr;vctx.fillStyle=kl[i].close>=kl[i].open?'rgba(248,81,73,.4)':'rgba(63,185,80,.4)';vctx.fillRect(x-cw/2,100-h,Math.max(1,cw),h)}
}

var curCode='',curPeriod=365;
async function chPeriod(code,days,btn){
  document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');curPeriod=days;
  try{
    var ind=await A('/v1/indicators/'+code+'?days='+days);
    drawCanvas(ind.klines);
    // Update table
    var kl=ind.klines,n=kl.length,tbl='';
    for(var i=n-1;i>=Math.max(0,n-30);i--){var k=kl[i],prev=i>0?kl[i-1]:null,ch=prev?((k.close-prev.close)/prev.close*100):0;tbl+='<tr><td>'+k.date+'</td><td>'+F(k.open)+'</td><td>'+F(k.high)+'</td><td>'+F(k.low)+'</td><td>'+F(k.close)+'</td><td>'+(k.volume/10000).toFixed(0)+'万</td><td class="'+C(ch)+'">'+(ch?((ch>0?'+':'')+F(ch,2)+'%'):'—')+'</td></tr>'}
    var tb=document.querySelector('#detail table');if(tb){var thead=tb.querySelector('thead').outerHTML;tb.innerHTML=thead+'<tbody>'+tbl+'</tbody>'}else{var el=document.querySelector('#detail');el.insertAdjacentHTML('beforeend','<div style=\"max-height:350px;overflow:auto\"><table><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>成交量</th><th>涨跌</th></tr></thead><tbody>'+tbl+'</tbody></table></div>')}
  }catch(e){}
}

loadNews();
init();
</script>
</body>
</html>
