<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票分析看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e1e4ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{font-size:22px;margin-bottom:4px}
.sub{color:#8890a0;font-size:12px;margin-bottom:20px}
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;padding:10px 14px;border:1px solid #2a2d3e;border-radius:8px;background:#1a1d2e;color:#fff;font-size:14px;outline:none}
.search-bar input::placeholder{color:#666}
.search-bar button{padding:10px 20px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:14px;cursor:pointer}
.search-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:20px}
.card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:12px;cursor:pointer;transition:border .2s}
.card:hover{border-color:#6366f1}
.card .name{font-size:13px;font-weight:600}
.card .code{font-size:10px;color:#8890a0}
.card .price{font-size:18px;font-weight:700;margin-top:4px}
.card .change{font-size:11px}
.section-title{font-size:14px;color:#8890a0;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:8px;margin-bottom:24px}
.detail-box{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:20px;margin:16px 0}
.back{color:#8890a0;cursor:pointer;margin-bottom:14px;font-size:13px}
.back:hover{color:#fff}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:14px}
.metric{background:#0f1117;border-radius:8px;padding:10px}
.metric .label{font-size:10px;color:#8890a0}
.metric .value{font-size:16px;font-weight:700;margin-top:3px}
.red{color:#ef4444}.green{color:#22c55e}
.hidden{display:none}
#loading{text-align:center;padding:60px;color:#8890a0;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top:2px solid #6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.period-btn{padding:6px 12px;border:1px solid #2a2d3e;border-radius:6px;background:transparent;color:#8890a0;cursor:pointer;font-size:11px;margin-right:6px}
.period-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
td,th{padding:6px 10px;text-align:right;border-bottom:1px solid #1a1d2e}
th{color:#8890a0;font-weight:400;font-size:10px}
td:first-child,th:first-child{text-align:left}
</style>
</head>
<body>
<div class="container">
  <div id="home">
    <h1>📈 股票分析看板</h1>
    <p class="sub">多市场覆盖 (A股·美股·港股) | 技术分析·基本面·情绪 | 数据延迟约15分钟</p>
    <div class="search-bar">
      <input id="searchInput" placeholder="搜索股票名称或代码 (茅台 / AAPL / 腾讯 ...)" onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="results" class="search-results"></div>
    <div class="section-title">市场快照 <span id="snapStatus" style="font-size:11px;color:#666"></span></div>
    <div class="grid" id="snapshot"></div>
  </div>
  <div id="detail" class="hidden"></div>
</div>

<script>
const MKT={cn:'🇨🇳',us:'🇺🇸',hk:'🇭🇰'};
const CUR={cn:'¥',us:'$',hk:'HK$'};
const DEFAULT=['600519','300750','AAPL','NVDA','TSLA','0700','1810','9988'];

async function api(p){const r=await fetch('/api'+p);if(!r.ok)throw new Error(r.status);return r.json()}

function show(id){document.getElementById('home').classList.toggle('hidden',id!=='home');document.getElementById('detail').classList.toggle('hidden',id!=='detail')}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  const data=await api('/v1/stocks/search?q='+encodeURIComponent(q));
  const el=document.getElementById('results');
  el.innerHTML=data.map(s=>{
    const c=s.change_pct||0,color=c>0?'red':c<0?'green':'';
    return `<div class="card" onclick="viewStock('${s.code}')">
      <div class="name">${MKT[s.market]||''} ${s.name}</div><div class="code">${s.code}</div>
      <div class="price">${CUR[s.market]||''}${(s.price||0).toFixed(2)}</div>
      <div class="change ${color}">${c>0?'+':''}${c.toFixed(2)}%</div>
    </div>`;
  }).join('');
  if(data.length===0)el.innerHTML='<p style="color:#8890a0;padding:20px">未找到匹配股票</p>';
}

// Load snapshot ONE AT A TIME to avoid overwhelming connections
async function loadSnapshot(){
  const el=document.getElementById('snapshot');
  const status=document.getElementById('snapStatus');
  el.innerHTML='<p style="color:#666;grid-column:1/-1;padding:20px"><span class="spinner"></span>加载中...</p>';
  status.textContent='';
  let loaded=0;
  for(let i=0;i<DEFAULT.length;i++){
    const code=DEFAULT[i];
    try{
      const q=await api('/v1/stocks/'+code+'/quote');
      const c=q.change_pct||0,color=c>0?'red':c<0?'green':'';
      const m=code.match(/^\d{6}$/)?'cn':/^\d{4,5}$/.test(code)?'hk':'us';
      el.innerHTML+=`<div class="card" onclick="viewStock('${code}')">
        <div class="name">${MKT[m]} ${q.name||code}</div>
        <div class="price">${CUR[m]}${q.price.toFixed(2)}</div>
        <div class="change ${color}">${c>0?'+':''}${c.toFixed(2)}%</div>
      </div>`;
      loaded++;
      status.textContent=`(${loaded}/${DEFAULT.length})`;
    }catch(e){
      el.innerHTML+=`<div class="card" style="opacity:.5"><div class="name">${code}</div><div class="price">加载失败</div></div>`;
    }
  }
  // Remove loading placeholder
  const spinner=el.querySelector('p');
  if(spinner)spinner.remove();
  if(loaded===0)status.textContent='(全部加载失败，请刷新重试)';
}

async function viewStock(code){
  document.getElementById('detail').innerHTML='<div id="loading"><span class="spinner"></span>加载中...</div>';
  show('detail');
  try{
    const[info,quote,ind]=await Promise.all([
      api('/v1/stocks/'+code+'/info'),
      api('/v1/stocks/'+code+'/quote'),
      api('/v1/indicators/'+code+'?days=365')
    ]);
    const m=info.market,flag=MKT[m]||'',cur=CUR[m]||'';
    const c=quote.change_pct||0,color=c>0?'red':c<0?'green':'';
    const klines=ind.klines,n=klines.length;
    const last=klines[n-1],rsi=ind.rsi14[n-1],kdj_k=ind.kdj_k?.[n-1],kdj_d=ind.kdj_d?.[n-1];

    document.getElementById('detail').innerHTML=`
      <div class="back" onclick="show('home')">← 返回大盘</div>
      <div class="detail-box">
        <h2 style="font-size:20px">${flag} ${info.name}</h2>
        <p style="color:#8890a0;font-size:12px">${code} · ${info.sector||''} ${info.industry||''}</p>
        <div style="font-size:28px;font-weight:700;margin:10px 0">${cur}${quote.price.toFixed(2)} <span class="${color}" style="font-size:16px">${c>0?'+':''}${c.toFixed(2)}%</span></div>
        <div class="metrics">
          <div class="metric"><div class="label">开盘</div><div class="value">${cur}${quote.open?.toFixed(2)||'—'}</div></div>
          <div class="metric"><div class="label">最高</div><div class="value">${cur}${quote.high?.toFixed(2)||'—'}</div></div>
          <div class="metric"><div class="label">最低</div><div class="value">${cur}${quote.low?.toFixed(2)||'—'}</div></div>
          <div class="metric"><div class="label">昨收</div><div class="value">${cur}${quote.pre_close?.toFixed(2)||'—'}</div></div>
          <div class="metric"><div class="label">成交量</div><div class="value" style="font-size:13px">${(quote.volume/10000).toFixed(0)}万</div></div>
          <div class="metric"><div class="label">RSI(14)</div><div class="value">${rsi!=null?rsi.toFixed(1):'—'}<span class="label" style="color:${rsi>70?'#ef4444':rsi<30?'#22c55e':''}">${rsi>70?' 超买':rsi<30?' 超卖':''}</span></div></div>
          <div class="metric"><div class="label">KDJ-K</div><div class="value">${kdj_k!=null?kdj_k.toFixed(1):'—'}</div></div>
          <div class="metric"><div class="label">KDJ-D</div><div class="value">${kdj_d!=null?kdj_d.toFixed(1):'—'}</div></div>
        </div>
        <div style="margin-top:14px">
          <span style="font-size:11px;color:#8890a0;margin-right:8px">K线数据:</span>
          <button class="period-btn active" onclick="changePeriod('${code}',30,this)">1月</button>
          <button class="period-btn" onclick="changePeriod('${code}',90,this)">3月</button>
          <button class="period-btn" onclick="changePeriod('${code}',180,this)">半年</button>
          <button class="period-btn" onclick="changePeriod('${code}',365,this)">1年</button>
        </div>
        <div id="klineTable" style="margin-top:8px;max-height:300px;overflow:auto"></div>
      </div>`;
    renderKlineTable(klines.slice(-20));
  }catch(e){
    document.getElementById('detail').innerHTML=`<div class="back" onclick="show('home')">← 返回</div><p style="color:#8890a0;text-align:center;padding:60px">加载失败: ${e.message}<br><span style="font-size:12px">请返回重试</span></p>`;
  }
}

function renderKlineTable(klines){
  const html=`<table><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>成交量</th><th>涨跌</th></tr></thead><tbody>
    ${klines.map((k,i)=>{
      const prev=klines[i-1],chg=prev?((k.close-prev.close)/prev.close*100).toFixed(2):'-';
      const color=chg>0?'red':chg<0?'green':'';
      return `<tr><td>${k.date}</td><td>${k.open.toFixed(2)}</td><td>${k.high.toFixed(2)}</td><td>${k.low.toFixed(2)}</td><td>${k.close.toFixed(2)}</td><td>${(k.volume/10000).toFixed(0)}万</td><td class="${color}">${chg>0?'+'+chg:chg}%</td></tr>`;
    }).join('')}
  </tbody></table>`;
  document.getElementById('klineTable').innerHTML=html;
}

async function changePeriod(code,days,btn){
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ind=await api('/v1/indicators/'+code+'?days='+days);
  renderKlineTable(ind.klines.slice(-20));
}

loadSnapshot();
</script>
</body>
</html>
