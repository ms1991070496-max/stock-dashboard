<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股票分析看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e1e4ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:24px;margin-bottom:4px}
.sub{color:#8890a0;font-size:13px;margin-bottom:20px}
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;padding:10px 14px;border:1px solid #2a2d3e;border-radius:8px;background:#1a1d2e;color:#fff;font-size:14px;outline:none}
.search-bar input::placeholder{color:#666}
.search-bar button{padding:10px 20px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:14px;cursor:pointer}
.search-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:10px;padding:14px;cursor:pointer;transition:border .2s}
.card:hover{border-color:#6366f1}
.card .name{font-size:14px;font-weight:600}
.card .code{font-size:11px;color:#8890a0}
.card .price{font-size:20px;font-weight:700;margin-top:4px}
.card .change{font-size:12px}
.section-title{font-size:14px;color:#8890a0;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.stock-detail{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:24px;margin:20px 0}
.back{color:#8890a0;cursor:pointer;margin-bottom:16px;font-size:13px}
.back:hover{color:#fff}
.chart-container{height:400px;margin:16px 0}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px}
.metric{background:#0f1117;border-radius:8px;padding:12px}
.metric .label{font-size:11px;color:#8890a0}
.metric .value{font-size:18px;font-weight:700;margin-top:4px}
.red{color:#ef4444}.green{color:#22c55e}
.hidden{display:none}
#loading{text-align:center;padding:40px;color:#8890a0}
.flag{font-size:12px;margin-right:4px}
.period-btn{padding:6px 14px;border:1px solid #2a2d3e;border-radius:6px;background:transparent;color:#8890a0;cursor:pointer;font-size:12px;margin-right:6px}
.period-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
</style>
</head>
<body>
<div class="container" id="app">
  <div id="home">
    <h1>📈 股票分析看板</h1>
    <p class="sub">多市场覆盖 (A股·美股·港股) | 技术分析 · 基本面 · 情绪</p>
    <div class="search-bar">
      <input id="searchInput" placeholder="搜索股票名称或代码 (茅台 / AAPL / 腾讯 ...)" onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="results" class="search-results"></div>
    <div class="section-title">市场快照</div>
    <div class="grid" id="snapshot"></div>
  </div>
  <div id="detail" class="hidden"></div>
  <div id="loading" class="hidden">加载中...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const MKT={cn:'🇨🇳',us:'🇺🇸',hk:'🇭🇰'};
const CUR={cn:'¥',us:'$',hk:'HK$'};
const DEFAULT=['600519','300750','AAPL','NVDA','TSLA','0700','1810','9988'];

async function api(p){const r=await fetch('/api'+p);return r.json()}

function show(id){document.querySelectorAll('#home,#detail,#loading').forEach(e=>e.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  const data=await api('/v1/stocks/search?q='+encodeURIComponent(q));
  renderResults(data);
}

function renderResults(data){
  const el=document.getElementById('results');
  el.innerHTML=data.map(s=>{
    const c=s.change_pct||0,color=c>0?'red':c<0?'green':'';
    return `<div class="card" onclick="viewStock('${s.code}')">
      <div class="name">${MKT[s.market]||''} ${s.name}</div><div class="code">${s.code}</div>
      <div class="price">${CUR[s.market]||''}${(s.price||0).toFixed(2)}</div>
      <div class="change ${color}">${c>0?'+':''}${c.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

async function loadSnapshot(){
  const data=await Promise.all(DEFAULT.map(c=>api('/v1/stocks/'+c+'/quote').catch(()=>null)));
  const el=document.getElementById('snapshot');
  el.innerHTML=DEFAULT.map((code,i)=>{
    const q=data[i],c=q?.change_pct||0,color=c>0?'red':c<0?'green':'';
    const m=code.match(/^\d{6}$/)?'cn':/^\d{4,5}$/.test(code)?'hk':'us';
    return `<div class="card" onclick="viewStock('${code}')">
      <div class="name">${MKT[m]} ${q?.name||code}</div>
      <div class="price">${q?CUR[m]+q.price.toFixed(2):'—'}</div>
      <div class="change ${color}">${q?(c>0?'+':'')+c.toFixed(2)+'%':'—'}</div>
    </div>`;
  }).join('');
}

async function viewStock(code){
  show('loading');
  try{
    const[info,quote,ind]=await Promise.all([
      api('/v1/stocks/'+code+'/info'),
      api('/v1/stocks/'+code+'/quote'),
      api('/v1/indicators/'+code+'?days=365')
    ]);
    const m=info.market,flag=MKT[m]||'',cur=CUR[m]||'';
    const c=quote.change_pct||0,color=c>0?'red':c<0?'green':'';
    document.getElementById('detail').innerHTML=`
      <div class="back" onclick="show('home')">← 返回大盘</div>
      <div class="stock-detail">
        <h2>${flag} ${info.name}</h2>
        <p style="color:#8890a0;font-size:13px">${code} · ${info.sector||''} ${info.industry||''}</p>
        <div style="font-size:28px;font-weight:700;margin:8px 0">${cur}${quote.price.toFixed(2)} <span class="${color}" style="font-size:16px">${c>0?'+':''}${c.toFixed(2)}%</span></div>
        <div style="margin:12px 0">
          ${[30,90,180,365].map(d=>`<button class="period-btn" onclick="changePeriod('${code}',${d})">${d>=365?d/365+'年':d/30+'月'}</button>`).join('')}
        </div>
        <div id="chart" class="chart-container"></div>
        <div class="metrics" id="metrics"></div>
      </div>`;
    show('detail');
    renderChart(ind);
  }catch(e){
    document.getElementById('detail').innerHTML=`<div class="back" onclick="show('home')">← 返回</div><p style="color:#8890a0;text-align:center;padding:60px">加载失败: ${e.message}</p>`;
    show('detail');
  }
}

function renderChart(ind){
  const klines=ind.klines,n=klines.length;
  const chart=LightweightCharts.createChart(document.getElementById('chart'),{
    width:document.getElementById('chart').clientWidth,height:400,
    layout:{background:{color:'#0f1117'},textColor:'#8890a0'},
    grid:{vertLines:{color:'#1a1d2e'},horzLines:{color:'#1a1d2e'}},
    crosshair:{mode:1},timeScale:{timeVisible:true}
  });
  const candleData=klines.map(k=>({time:k.date,open:k.open,high:k.high,low:k.low,close:k.close}));
  const cs=chart.addCandlestickSeries({upColor:'#ef4444',downColor:'#22c55e',borderUpColor:'#ef4444',borderDownColor:'#22c55e',wickUpColor:'#ef4444',wickDownColor:'#22c55e'});
  cs.setData(candleData);
  [['ma5','#f59e0b'],['ma10','#3b82f6'],['ma20','#8b5cf6']].forEach(([k,color])=>{
    const d=[];ind[k].forEach((v,i)=>{if(v!=null)d.push({time:klines[i].date,value:v})});
    if(d.length){const s=chart.addLineSeries({color,lineWidth:1});s.setData(d)}
  });
  // Volume
  const vs=chart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
  vs.setData(klines.map(k=>({time:k.date,value:k.volume,color:k.close>=k.open?'rgba(239,68,68,.4)':'rgba(34,197,94,.4)'})));
  chart.priceScale('vol').applyOptions({scaleMargins:{top:.8,bottom:0}});
  // Metrics
  const last=klines[n-1],rsi=ind.rsi14[n-1],k_val=ind.kdj_k?.[n-1],d_val=ind.kdj_d?.[n-1];
  document.getElementById('metrics').innerHTML=[
    ['收盘价',last.close.toFixed(2)],
    ['MA5',ind.ma5[n-1]?.toFixed(2)||'—'],
    ['RSI(14)',rsi!=null?rsi.toFixed(1):'—',rsi>70?'超买':rsi<30?'超卖':''],
    ['KDJ-K',k_val!=null?k_val.toFixed(1):'—'],
    ['KDJ-D',d_val!=null?d_val.toFixed(1):'—'],
  ].map(([l,v,t])=>`<div class="metric"><div class="label">${l}</div><div class="value">${v}</div>${t?`<div class="label" style="color:${t==='超买'?'#ef4444':'#22c55e'}">${t}</div>`:''}</div>`).join('');
  window.addEventListener('resize',()=>chart.applyOptions({width:document.getElementById('chart').clientWidth}));
}

async function changePeriod(code,days){
  const ind=await api('/v1/indicators/'+code+'?days='+days);
  document.querySelectorAll('.period-btn').forEach((b,i)=>{
    b.classList.toggle('active',[30,90,180,365][i]===days);
  });
  document.getElementById('chart').innerHTML='';
  renderChart(ind);
}

// Init
loadSnapshot();
</script>
</body>
</html>
